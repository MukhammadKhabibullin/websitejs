<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Product card </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
    <button id="change-color-all-button">Меняет цвет всех карточек</button>
    <button id="change-color-first-card">Меняет цвет первой карточки</button>
    <button id="open-google">Открыть страницу Google.com</button>
    <button id="output-console-log">Вывести сообщение в консоль лог</button>
    <button class="button-change-color">Меняет цвет</button>
    <button class="temperature">Температура</button>
    <button id="openModal">Регестрация</button>
    <div>
         <div class="background-image"></div>
    </div>
        <div class="content-container">
            <div class="title-container">
                <h1 id="product-list-title" class="title">Выбери свой продукт</h1>
            </div> 
            <ul class="cards-container"></ul>
                <template id="card-template">  
                    <li class="card-container">
                        <img class="picture" width="290" height="245"/>
                        <span class="product-category">для нормальной кожи</span>
                        <h3 class="product-name"></h3>
                        <p class="product-description"></p>
                        <span>Состав: </span>
                        <ul class="product-compound">
                        </ul>
                        <div class="product-price-style">
                            <span class="product-price-text">Цена</span>
                            <span class="product-price"></span>
                        </div>
                    </li>
            </template>
        </div>
    </div>
    </main> 
    <footer>
        <div class="footer">
            <div class="footer-wrapper">
                <div class="footer-wrapper-left">
                    <div class="footer-wrapper-left-title">
                        <h2 class="name-product-cards">Product Cards</h2>
                    </div>
                    <div class="footer-wrapper-left-text">
                        <p class="footer-text">У Нас Самые Лучшие Продукты Для Кожи!</p>
                    </div>
                    <div class="footer-wrapper-left-social">
                        <img class="social-icon-telegram" src="/images/telegram-icon.png" alt="">
                        <img class="social-icon-vk" src="/images/vk-icon.png" alt="">
                    </div>
                </div>
                <div class="footer-wrapper-subscribe-form">
                    <form id="subscribe-form">
                        <p class="footer-wrapper-center-text">Подпишись на наши акции:</p>
                        <div class="footer-input-container">
                            <input type="email" id="email" name="email" autocomplete="email"  placeholder="Введите Email..." required>
                            <button type="submit">Подписаться</button>
                        </div>
                    </form>
                </div>
                <div class="footer-wrapper-raight">
                    <h2 class="footer-wrapper-raight-title">Быстрые ссылки</h2>
                    <div class="footer-wrapper-raight-nav">
                        <nav>
                            <ul>
                                <li>
                                    <a class="footer-text" href="#">Главная</a>
                                </li>
                                <li>
                                    <a class="footer-text" href="#">Магазин</a>
                                </li>
                                <li>
                                    <a class="footer-text" href="#">Контакты</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
            <div class="footer-lower">
                <div class="footer-line"></div>
                <p class="footer-lower-name">www.product-cards.com © all right reserve</p>
            </div>
        </div>
    </footer>

    <div class="modal">
        <div class="overlay"></div>
        <div class="modal-container">
            <div class="modal-body">
                <div class="modal-header">
                    <h2>Регистрация</h2>
                </div>
                <div class="modal-close">
                    <span>&times;</span>
                </div>
                <form class="modal-content"5>
                    <div class="modal-registration-content">
                        <label for="username" class="registration-form-label">Имя</label>
                        <input id="username" type="text" placeholder="Введите ваше имя" name="username" required class="registration-form-input">
                    </div>
                    <div class="modal-registration-content">
                        <label for="surname" class="registration-form-label">Фамилия</label>
                        <input type="text" id="surname" placeholder="Введите вашу фамилию" name="surname" required class="registration-form-input">
                    </div>
                    <div class="modal-registration-content">
                        <label for="data" class="registration-form-label">Дата рождение</label>
                        <input type="date" id="data" placeholder="Введите дату" name="data" required class="registration-form-input">
                    </div>
                    <div class="modal-registration-content">
                        <label for="login" class="registration-form-label">Логин</label>
                        <input type="text" id="login" placeholder="Введите логин" name="login" required class="registration-form-input">
                    </div>
                    <div class="modal-registration-content">
                        <label for="password" class="registration-form-label">Придумайте пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль" name="password" required class="registration-form-input"> 
                    </div>
                    <div class="modal-registration-content">
                        <label for="repeat-password" class="registration-form-label">Потвердите пароль</label>
                        <input type="password" id="repeat-password" placeholder="Повторите пароль" name="repeat-password" required class="registration-form-input">
                    </div>
                    <button class="button-registration">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <script src="./main.js"></script>
    <script src="./homework-5.js"></script>
    <script src="./homework-6.js"></script>
    <script type="module" src="./homework-7.js"></script>
    <script type="module" src="./homework-8.js"></script>
    <script type="module" src="./homework-9.js"></script>
</body>
</html>
